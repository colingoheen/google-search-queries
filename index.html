<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flighthouse x Google</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f0f0f;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
.wrap{position:fixed;inset:0;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid #222;flex-shrink:0;background:#0f0f0f}
.back-btn{background:none;border:none;color:#4fc3f7;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0;font-family:inherit}
.back-arrow{font-size:18px;line-height:1}
.topbar-title{font-size:13px;color:#555;flex:1;text-transform:uppercase;letter-spacing:0.06em}
.topbar-brand{font-size:13px;font-weight:600;color:#f0f0f0;letter-spacing:0.02em}

.scroll{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.brand-header{margin-bottom:24px}
.brand-eyebrow{font-size:11px;color:#4fc3f7;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.brand-title{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.brand-sub{font-size:13px;color:#555;line-height:1.5}

.topic-card{background:#1a1a1a;border:1px solid #252525;border-radius:14px;padding:18px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s}
.topic-card:active{background:#222;border-color:#4fc3f7}
.topic-name{font-size:17px;font-weight:600;margin-bottom:3px}
.topic-sub{font-size:12px;color:#555}
.topic-arrow{font-size:24px;color:#333}

/* vertical 9:16 video container — 60% wide, centered */
.video-outer{width:60%;margin:0 auto 20px;}
.video-wrap{position:relative;padding-top:177.77777777777777%;border-radius:12px;overflow:hidden;background:#111;}
.video-wrap iframe{border:none;position:absolute;top:0;left:0;height:100%;width:100%;}

.intro-label{font-size:11px;color:#555;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.script-line{display:flex;gap:12px;margin-bottom:12px}
.script-line:last-child{margin-bottom:0}
.speaker{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0;padding-top:2px;min-width:36px}
.speaker.host{color:#4fc3f7}
.speaker.fan{color:#81c784}
.line-text{font-size:15px;line-height:1.55;color:#e0e0e0}
.stage-direction{font-size:13px;color:#555;font-style:italic;margin-bottom:12px;line-height:1.5;padding-left:4px}

.query-btn{width:100%;background:#1a2a3a;border:1px solid #1e3a5f;border-radius:14px;padding:18px 16px;margin-top:6px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background 0.15s;font-family:inherit}
.query-btn:active{background:#1e3a5f}
.query-btn-label{font-size:11px;color:#4fc3f7;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px}
.query-btn-text{font-size:16px;font-weight:600;color:#f0f0f0;line-height:1.35}
.query-btn-arrow{font-size:22px;color:#4fc3f7;flex-shrink:0}

.resp-query-label{font-size:11px;color:#555;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.resp-query-text{font-size:19px;font-weight:700;line-height:1.3;color:#f0f0f0;margin-bottom:16px}
.divider{height:1px;background:#1e1e1e;margin:16px 0}
.resp-body{font-size:15px;line-height:1.7;color:#d0d0d0}
.resp-body p{margin-bottom:10px}
.rh{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#4fc3f7;margin:16px 0 8px}
.ri{display:flex;gap:10px;margin-bottom:8px}
.rb{color:#4fc3f7;flex-shrink:0;margin-top:3px;font-size:13px}

.fu-section{flex-shrink:0;border-top:1px solid #1e1e1e;background:#0f0f0f;padding:14px 16px 20px}
.fu-label{font-size:11px;color:#444;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.fu-btn{width:100%;background:#1a1a1a;border:1px solid #252525;border-radius:12px;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:inherit;transition:border-color 0.15s}
.fu-btn:last-child{margin-bottom:0}
.fu-btn:active{background:#222;border-color:#4fc3f7}
.fu-btn-text{font-size:14px;color:#e0e0f0;line-height:1.35;flex:1}
.fu-btn-arrow{font-size:18px;color:#333;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap">

<!-- HOME -->
<div class="screen active" id="s-home">
<div class="topbar">
<div class="topbar-brand">Flighthouse x Google</div>
</div>
<div class="scroll">
<div class="brand-header">
<div class="brand-eyebrow">RPM Social · AI Overview Shoot</div>
<div class="brand-title">Select a skill</div>
<div class="brand-sub">Tap a topic to see the intro script and approved queries.</div>
</div>
<div id="topic-list"></div>
</div>
</div>

<!-- INTRO -->
<div class="screen" id="s-intro">
<div class="topbar">
<button class="back-btn" onclick="goHome()"><span class="back-arrow">←</span> Skills</button>
<div class="topbar-title" id="intro-topbar-title"></div>
</div>
<div class="scroll">
<div class="video-outer">
  <div class="video-wrap">
    <iframe id="intro-video" src="" loading="lazy" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true"></iframe>
  </div>
</div>
<div class="intro-label">Intro Script</div>
<div id="intro-script-content"></div>
<button class="query-btn" onclick="openMainResponse()">
<div>
<div class="query-btn-label">Tap to read query</div>
<div class="query-btn-text" id="main-query-text"></div>
</div>
<div class="query-btn-arrow">›</div>
</button>
</div>
</div>

<!-- MAIN RESPONSE -->
<div class="screen" id="s-response">
<div class="topbar">
<button class="back-btn" onclick="goIntro()"><span class="back-arrow">←</span> <span id="resp-back-label">Back</span></button>
<div class="topbar-title" id="resp-topbar-title"></div>
</div>
<div class="scroll">
<div class="resp-query-label">Query</div>
<div class="resp-query-text" id="resp-query-text"></div>
<div class="divider"></div>
<div class="resp-body" id="resp-body"></div>
</div>
<div class="fu-section">
<div class="fu-label">Follow-up questions</div>
<div id="fu-buttons"></div>
</div>
</div>

<!-- FOLLOW-UP RESPONSE -->
<div class="screen" id="s-fu-response">
<div class="topbar">
<button class="back-btn" onclick="goResponse()"><span class="back-arrow">←</span> <span id="fu-back-label">Back</span></button>
<div class="topbar-title" id="fu-topbar-title"></div>
</div>
<div class="scroll">
<div class="resp-query-label">Follow-up Query</div>
<div class="resp-query-text" id="fu-query-text"></div>
<div class="divider"></div>
<div class="resp-body" id="fu-resp-body"></div>
</div>
</div>

</div>

<script>

  {

    intro:[

      {query:"How do I know when to start my jump?",response:"To time your launch perfectly, you must start your jump when the ball is roughly 1 to 2 feet above your head and slightly behind your shoulders. Starting your jump at this exact threshold gives your body time to invert before the ball falls into your strike zone."},

    intro:[
      {speaker:"HOST",text:"Hey, can you do this?"},

    intro:[
      {speaker:"HOST",text:"Hey, you think you can score a volley?"},
      {type:"stage",text:"Shows fan a video of a successful volley goal."},
      {speaker:"FAN",text:"Looks tricky, would definitely be cool if I could though."},
      {speaker:"HOST",text:"Wanna see if Google Search can teach you how in 5 minutes?"},

      {speaker:"HOST",text:"Not as easy as it looks, huh? Should we see if Google can help you nail it?"},

    query:"Can you teach me how to score a volley?",
    response:"● Track the Flight: Keep your eyes locked on the ball. Never look away until your foot makes physical contact.\n● The Plant Foot: Place your non-kicking foot beside or slightly behind where the ball will drop. Point its toes directly toward your target or the goal.\n● Keep Your Knee Over the Ball: Lean your chest forward and position the knee of your kicking leg directly over the ball at the moment of contact. This mechanical shift keeps your shot low and driven.\n● The Striking Surface: Hit the exact middle or upper-middle section of the ball cleanly with your laces.\n● Control the Follow-Through: Drive your leg straight through the center of the ball toward the target. Do not swing wildly across your body.\n3 Rules to Control Trajectory\n● If the ball flies over the crossbar: You are leaning back or hitting the bottom half of the ball. Lean your chest forward over your thigh to force the trajectory down.\n● The Waist-Height Rule: The easiest place to strike a volley is between your knee and waist height. If the ball is chest-high, wait for it to drop or use a side-volley technique.",
    afterResponse:"Fan goes through the motions as the host reads the steps. Then attempts again. After another fail, the fan may ask follow up questions.",
    followUps:[
      {query:"What's the most important part of the volley to get right?",response:"The single most important part of the volley to get right is locking your ankle joint completely rigid with your toes pointed down. If your ankle is loose or floppy at the millisecond of contact, every other mechanical adjustment fails."},
      {query:"How do I keep the ball low?",response:"● Force your shoulders and chest forward, pointing them down toward the grass rather than up at the sky.\n● Raise your kicking leg so that your knee joint is physically positioned directly above the ball when you strike it.\n● Swing your leg straight forward along a horizontal plane through the line of the ball. Do not scoop your foot upward during the follow-through."},

  {
    id:"keepie", name:"Keepie Uppie", sub:"3 follow-up queries",

let curTopic = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const sc = document.getElementById(id).querySelector('.scroll');
  if (sc) sc.scrollTop = 0;
}

function goHome() {
  document.getElementById('intro-video').src = '';
  curTopic = null;
  show('s-home');
}
function goIntro() { show('s-intro'); }
function goResponse() { show('s-response'); }

function hl(str) {
  return str.replace(/==(.+?)==/g, '<mark style="background:#e040fb;color:#000;border-radius:3px;padding:0 2px;">$1</mark>');
}
function fmt(text) {
  const lines = text.split('\n'); let html = '';
  for (const line of lines) {
    const t = line.trim(); if (!t) continue;
    if (t.startsWith('●')) {
      const c = t.replace(/^●\s*/, ''); const ci = c.indexOf(':');
      if (ci > 0 && ci < 50) {
        html += `<div class="ri"><span class="rb">●</span><span><strong>${c.slice(0,ci)}:</strong> ${hl(c.slice(ci+1).trim())}</span></div>`;
      } else {
        html += `<div class="ri"><span class="rb">●</span><span>${hl(c)}</span></div>`;
      }
    } else if (t.endsWith(':') && t.length < 60 && !t.startsWith('●')) {
      html += `<div class="rh">${t.slice(0,-1)}</div>`;
    } else {
      html += `<p>${hl(t)}</p>`;
    }
  }
  return html;
}

function buildIntro(topic) {
  let html = '';
  for (const line of topic.intro) {
    if (line.type === 'stage') {
      html += `<p class="stage-direction">*${line.text}*</p>`;
    } else {
      const cls = line.speaker === 'HOST' ? 'host' : 'fan';
      html += `<div class="script-line"><span class="speaker ${cls}">${line.speaker}</span><span class="line-text">${line.text}</span></div>`;
    }
  }
  return html;
}

function openTopic(id) {
  curTopic = TOPICS.find(t => t.id === id);
  document.getElementById('intro-topbar-title').textContent = curTopic.name;
  document.getElementById('intro-video').src = curTopic.videoSrc;
  document.getElementById('intro-script-content').innerHTML = buildIntro(curTopic);
  document.getElementById('main-query-text').textContent = curTopic.query;
  show('s-intro');
}

function openMainResponse() {
  document.getElementById('resp-back-label').textContent = curTopic.name;
  document.getElementById('resp-topbar-title').textContent = curTopic.name;
  document.getElementById('resp-query-text').textContent = curTopic.query;
  document.getElementById('resp-body').innerHTML =
    fmt(curTopic.response) +
    `<p class="stage-direction" style="margin-top:16px">*${curTopic.afterResponse}*</p>`;
  document.getElementById('fu-buttons').innerHTML = curTopic.followUps.map((fu, i) =>
    `<button class="fu-btn" onclick="openFollowUp(${i})"><span class="fu-btn-text">${fu.query}</span><span class="fu-btn-arrow">›</span></button>`
  ).join('');
  show('s-response');
}

function openFollowUp(i) {
  const fu = curTopic.followUps[i];
  document.getElementById('fu-back-label').textContent = curTopic.name;
  document.getElementById('fu-topbar-title').textContent = curTopic.name;
  document.getElementById('fu-query-text').textContent = fu.query;
  document.getElementById('fu-resp-body').innerHTML = fmt(fu.response);
  show('s-fu-response');
}

document.getElementById('topic-list').innerHTML = TOPICS.map(t =>
  `<div class="topic-card" onclick="openTopic('${t.id}')">
    <div><div class="topic-name">${t.name}</div><div class="topic-sub">${t.sub}</div></div>
    <div class="topic-arrow">›</div>
  </div>`
).join('');
</script>
</body>
</html>
